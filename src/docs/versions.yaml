paths:
  /versions/{versionId}:
    get:
      tags:
        - Versions
      summary: Retorna uma versão específica pelo ID
      parameters:
        - in: path
          name: versionId
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID da versão (número inteiro positivo)
      responses:
        200:
          description: Sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Versão não encontrada

    delete:
      tags:
        - Versions
      summary: Remove uma versão
      parameters:
        - in: path
          name: versionId
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID da versão
      responses:
        204:
          description: Versão removida com sucesso (sem conteúdo)
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Versão não encontrada