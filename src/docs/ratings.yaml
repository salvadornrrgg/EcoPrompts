  /prompts/{id}/versions:
    get:
      tags:
        - Prompts
        - Versions
      summary: Lista todas as versões de um prompt
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID do prompt
      responses:
        200:
          description: Sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Version'
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Prompt não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Prompts
        - Versions
      summary: Cria uma nova versão para um prompt
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID do prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVersionInput'
      responses:
        201:
          description: Versão criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
        400:
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Prompt não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'