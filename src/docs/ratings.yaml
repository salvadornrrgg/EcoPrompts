paths:
  /ratings:
    post:
      tags:
        - Ratings
      summary: Cria uma nova avaliação para um prompt (deprecated – usar /prompts/{id}/rating)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - score
                - userId
                - promptId
              properties:
                score:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 5
                userId:
                  type: integer
                  example: 1
                promptId:
                  type: integer
                  example: 1
      responses:
        201:
          description: Avaliação criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        400:
          description: Dados inválidos ou erro de negócio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Token não fornecido ou inválido

  /prompts/{id}/rating:
    put:
      tags:
        - Ratings
      summary: Atualiza a avaliação de um prompt feita pelo próprio utilizador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID do prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - score
                - userId
              properties:
                score:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 4
                userId:
                  type: integer
                  example: 1
      responses:
        200:
          description: Avaliação atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rating'
        400:
          description: Dados inválidos ou rating não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Token não fornecido ou inválido
        403:
          description: Não pode atualizar avaliação de outro utilizador

    delete:
      tags:
        - Ratings
      summary: Remove a avaliação de um prompt feita pelo próprio utilizador
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID do prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: integer
                  example: 1
      responses:
        204:
          description: Avaliação removida com sucesso
        400:
          description: Erro ou rating não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Token não fornecido ou inválido
        403:
          description: Não pode remover avaliação de outro utilizador

  /ratings/{id}:
    delete:
      tags:
        - Ratings
      summary: Remove avaliação (apenas admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID da avaliação
      responses:
        204:
          description: Avaliação removida com sucesso
        400:
          description: ID inválido ou erro
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Token não fornecido ou inválido
        403:
          description: Apenas administradores podem aceder a este endpoint