/ratings:
  post:
    tags:
      - Ratings
    summary: Cria uma nova avaliação para um prompt
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - score
              - userId
              - promptId
            properties:
              score:
                type: integer
                minimum: 1
                maximum: 5
                example: 5
              userId:
                type: integer
                example: 1
              promptId:
                type: integer
                example: 1
    responses:
      201:
        description: Avaliação criada com sucesso
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Rating'
      400:
        description: Dados inválidos ou erro de negócio
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/prompts/{id}/rating:
  put:
    tags:
      - Ratings
    summary: Atualiza a avaliação de um prompt feita por um utilizador
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          minimum: 1
        description: ID do prompt
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - score
              - userId
            properties:
              score:
                type: integer
                minimum: 1
                maximum: 5
                example: 4
              userId:
                type: integer
                example: 1
    responses:
      200:
        description: Avaliação atualizada com sucesso
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Rating'
      400:
        description: Dados inválidos ou rating não encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

  delete:
    tags:
      - Ratings
    summary: Remove a avaliação de um prompt feita por um utilizador
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          minimum: 1
        description: ID do prompt
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - userId
            properties:
              userId:
                type: integer
                example: 1
    responses:
      204:
        description: Avaliação removida com sucesso
      400:
        description: Erro ou rating não encontrado
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'

/ratings/{id}:
  delete:
    tags:
      - Ratings
    summary: Remove avaliação (admin)
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          minimum: 1
        description: ID da avaliação
    responses:
      204:
        description: Avaliação removida com sucesso
      400:
        description: ID inválido ou erro
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ErrorResponse'