paths:
  /prompts:
    get:
      tags:
        - Prompts
      summary: Retorna a lista de todos os prompts
      responses:
        200:
          description: Sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prompt'
        500:
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Prompts
      summary: Cria um novo prompt
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromptInput'
      responses:
        201:
          description: Prompt criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prompt'
        400:
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Token não fornecido ou inválido
  /prompts/search:
    get:
      tags:
        - Prompts
      summary: Pesquisa prompts por similaridade
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 1
          description: Termo de pesquisa
      responses:
        200:
          description: Sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prompt'
        400:
          description: Termo de pesquisa inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        500:
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                
  /prompts/{id}:
    get:
      tags:
        - Prompts
      summary: Retorna um prompt específico pelo ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID do prompt (número inteiro positivo)
      responses:
        200:
          description: Sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prompt'
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Prompt não encontrado

    put:
      tags:
        - Prompts
      summary: Atualiza um prompt existente (apenas autor ou admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID do prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePromptInput'
      responses:
        200:
          description: Prompt atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prompt'
        400:
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Token não fornecido ou inválido
        403:
          description: Apenas o autor ou admin podem editar
        404:
          description: Prompt não encontrado

    delete:
      tags:
        - Prompts
      summary: Remove um prompt (e todas as suas versões) – autor ou moderador/admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID do prompt
      responses:
        204:
          description: Prompt removido com sucesso (sem conteúdo)
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Token não fornecido ou inválido
        403:
          description: Sem permissão para apagar este prompt
        404:
          description: Prompt não encontrado