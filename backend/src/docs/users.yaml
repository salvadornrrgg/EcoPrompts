paths:
  /users:
    get:
      tags:
        - Users
      summary: Lista todos os utilizadores (apenas admin)
      security:
        - bearerAuth: []
      responses:
        200:
          description: Sucesso — devolve array com todos os utilizadores (sem password)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        401:
          description: Token não fornecido
        403:
          description: Permissão negada (não é admin)

    post:
      tags:
        - Users
      summary: Cria um novo utilizador (registo público)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserInput'
      responses:
        201:
          description: Utilizador criado — devolve o utilizador sem password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        400:
          description: Dados inválidos ou email já em uso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validacao:
                  summary: Erro de validação Zod
                  value:
                    error: "Dados inválidos"
                    errors:
                      - field: "email"
                        message: "Email inválido"
                emailEmUso:
                  summary: Email já registado
                  value:
                    error: "Email já está em uso"

  /users/{id}:
    get:
      tags:
        - Users
      summary: Retorna um utilizador pelo ID
      description: |
        Rota pública. O campo `email` só é incluído na resposta se o pedido
        incluir um token Bearer válido do próprio utilizador ou de um admin.
        Sem token (ou token de outro utilizador), a resposta omite o email.
      security:
        - {}
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID do utilizador
      responses:
        200:
          description: Sucesso
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UserPublic'
                  - $ref: '#/components/schemas/User'
              examples:
                publico:
                  summary: Sem autenticação (sem email)
                  value:
                    id: 1
                    username: "john_doe"
                    userType: "User"
                    createdAt: "2025-01-15T10:30:00.000Z"
                autenticado:
                  summary: Próprio utilizador ou admin (com email)
                  value:
                    id: 1
                    username: "john_doe"
                    email: "john@example.com"
                    userType: "User"
                    createdAt: "2025-01-15T10:30:00.000Z"
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Utilizador não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Users
      summary: Atualiza um utilizador (apenas próprio ou admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID do utilizador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserInput'
      responses:
        200:
          description: Utilizador atualizado — devolve o utilizador sem password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        400:
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Token não fornecido
        403:
          description: Acesso negado (não é o próprio nem admin)
        404:
          description: Utilizador não encontrado

    delete:
      tags:
        - Users
      summary: Remove um utilizador (apenas próprio ou admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
          description: ID do utilizador
      responses:
        204:
          description: Utilizador removido com sucesso (sem conteúdo)
        400:
          description: ID inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        401:
          description: Token não fornecido
        403:
          description: Acesso negado (não é o próprio nem admin)
        404:
          description: Utilizador não encontrado
